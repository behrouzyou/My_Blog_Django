{% load static %}
<!doctype html>
<html lang="fa" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>{% block title %}وبلاگ{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top glass-nav">

    <div class="container">

        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            <i class="bi bi-journal-richtext"></i>
            Blog
        </a>

        <button class="navbar-toggler text-white"
                data-bs-toggle="collapse"
                data-bs-target="#nav">
            ☰
        </button>

        <div class="collapse navbar-collapse" id="nav">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">خانه</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">درباره</a>
                </li>

            </ul>

            <form class="d-flex me-3" method="get" action="{% url 'search' %}">
                <input class="form-control search-box"
                       type="search"
                       name="q"
                       placeholder="جستجو...">

                <button class="btn btn-primary ms-2">
                    <i class="bi bi-search"></i>
                </button>

            </form>

            <a href="{% url 'login' %}" class="btn btn-outline-light me-2">
                ورود
            </a>

            <a href="{% url 'register' %}" class="btn btn-gradient">
                ثبت نام
            </a>

        </div>

    </div>

</nav>

<div style="height:95px"></div>

<main class="container fade-up">

    {% block content %}
    {% endblock %}

</main>

<footer class="footer mt-5">

    <div class="container text-center">

        <h5>وبلاگ من</h5>

        <p class="text-secondary">
            ساخته شده با Django ❤️
        </p>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
